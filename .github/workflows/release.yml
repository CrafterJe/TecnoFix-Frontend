name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate WiX installer images
        run: |
          magick src-tauri/wix/banner.svg -resize 493x58! src-tauri/wix/banner.bmp
          magick src-tauri/wix/dialog.svg -resize 493x312! src-tauri/wix/dialog.bmp

      - name: Write signing key to file
        run: |
          $keyPath = "$env:RUNNER_TEMP\tecnofix.key"
          [System.IO.File]::WriteAllText($keyPath, "$env:TAURI_SIGNING_PRIVATE_KEY")
          echo "TAURI_KEY_PATH=$keyPath" >> $env:GITHUB_ENV
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.TAURI_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TecnoFix ${{ github.ref_name }}'
          releaseBody: 'Ver el historial de cambios para más detalles.'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: false
