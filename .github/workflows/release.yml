name: Release

on:
  push:
    tags:
      - 'v*'

# Fix para la advertencia de Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate WiX installer images
        run: |
          magick src-tauri/wix/banner.svg -resize 493x58! src-tauri/wix/banner.bmp
          magick src-tauri/wix/dialog.svg -resize 493x312! src-tauri/wix/dialog.bmp

      - name: Debug signing key
        run: |
          if ([string]::IsNullOrEmpty($env:KEY)) {
            echo "TAURI_SIGNING_PRIVATE_KEY esta VACIO"
          } else {
            echo "TAURI_SIGNING_PRIVATE_KEY esta SET (length: $($env:KEY.Length))"
          }
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Inyectamos el contenido de la llave directamente como variable de entorno
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TecnoFix ${{ github.ref_name }}'
          releaseBody: 'Ver el historial de cambios para más detalles.'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          # El flag verbose nos dirá exactamente por qué falla si la firma no se genera
          args: --verbose